[pytest]
markers =
    caso1: Testes para diferencas de grafia e erros tipograficos
    tipografia: Testes especificos para tratamento de caracteres tipograficos
    caso2: Testes para sobrenome acompanhado das iniciais dos nomes
    iniciais: Testes especificos para tratamento e expansao de iniciais
    caso3: Testes para tratamento de particulas opcionais e pontos
    particulas: Testes especificos para reintegracao de particulas de ligacao
    caso4: Testes para iniciais agrupadas coladas ao sobrenome
    agrupados: Testes especificos para desmembramento de blocos de iniciais
    caso5: Testes para mapeamento e unificacao de IDs redundantes
    deduplicacao: Testes especificos para resolucao de padrão-ouro de IDs
    excecoes: Testes de integridade estrutural e tratamento de erros
    erros: Testes especificos para lancamento de excecoes controladas